version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend/jobsearchai.db:/app/jobsearchai.db
      - ./backend/output:/app/output
    env_file:
      - ./backend/.env
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_BASE_URL=/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: always
